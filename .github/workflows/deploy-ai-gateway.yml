name: Deploy PursuitHQ AI gateway

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pursuithq-ai-gateway-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ai-gateway
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-gateway/package-lock.json

      - name: Install gateway dependencies
        run: npm ci

      - name: Run gateway tests
        run: npm test

      - name: Validate Wrangler deployment
        run: npm run deploy:dry-run

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

